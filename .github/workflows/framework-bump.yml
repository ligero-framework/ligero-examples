name: Bump Ligero version

# The example apps pin the framework version in their build.gradle files. When
# the framework publishes a release it fires a repository_dispatch here; this
# workflow rewrites every com.ligeroframework:*:<version> coordinate to the new
# version and opens a PR, so the examples always build against the latest
# published framework. Also runnable by hand from the Actions tab.
on:
  repository_dispatch:
    types: [framework-released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Framework version to target (without leading v)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          v="${{ github.event.client_payload.version || github.event.inputs.version }}"
          v="${v#v}"
          if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$v' is not X.Y.Z — skipping the bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Rewrite pinned Ligero coordinates
        if: steps.v.outputs.skip != 'true'
        run: |
          find . -name build.gradle -not -path '*/build/*' -print0 \
            | xargs -0 sed -i -E \
              "s#(com\.ligeroframework:[a-z-]+:)[0-9]+\.[0-9]+\.[0-9]+#\1${{ steps.v.outputs.version }}#g"

      - name: Open the version-bump PR
        if: steps.v.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          base: main
          branch: chore/ligero-${{ steps.v.outputs.version }}
          delete-branch: true
          commit-message: "chore: build examples against Ligero ${{ steps.v.outputs.version }}"
          title: "chore: build examples against Ligero ${{ steps.v.outputs.version }}"
          body: |
            Automated bump of every `com.ligeroframework:*` dependency in the
            example apps to `${{ steps.v.outputs.version }}`, triggered by the
            framework's release. Merge once CI is green.
          author: Duvan Jamid <duvanjamid.work@gmail.com>
          committer: Duvan Jamid <duvanjamid.work@gmail.com>
