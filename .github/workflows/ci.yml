name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # A Redis service so the redis-scale example's rate-limit/session test runs
    # for real instead of being skipped.
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      # Los ejemplos consumen ligero-* desde mavenLocal: se publica el framework primero
      - uses: actions/checkout@v4
        with:
          repository: ligero-framework/ligero
          path: framework
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: cd framework && ./gradlew publishToMavenLocal --no-daemon
      - run: gradle build --no-daemon
