# docker compose up --build
# Two app instances behind the same Redis — rate limits and sessions are shared.
services:
  app1:
    build:
      context: ..
      dockerfile: redis-scale/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  app2:
    build:
      context: ..
      dockerfile: redis-scale/Dockerfile
    ports:
      - "8081:8080"
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
